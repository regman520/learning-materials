<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語音打字機 🎤</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      width: 100%;
      max-width: 720px;
      padding: 2rem;
    }
    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: .5rem;
    }
    .sub {
      text-align: center;
      color: #888;
      margin-bottom: 2rem;
      font-size: .9rem;
    }
    .mic-btn {
      display: block;
      width: 100px;
      height: 100px;
      margin: 0 auto 2rem;
      border-radius: 50%;
      border: 4px solid #e94560;
      background: transparent;
      color: #e94560;
      font-size: 3rem;
      cursor: pointer;
      transition: all .3s;
      position: relative;
    }
    .mic-btn:hover { background: #e94560; color: #fff; }
    .mic-btn.listening {
      background: #e94560;
      color: #fff;
      animation: pulse 1s infinite;
      box-shadow: 0 0 30px #e94560;
    }
    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    .status {
      text-align: center;
      margin-bottom: 1rem;
      min-height: 1.5rem;
      color: #aaa;
      font-size: .85rem;
    }
    .status.active { color: #e94560; }
    .textarea-wrap {
      position: relative;
      margin-bottom: 1rem;
    }
    textarea {
      width: 100%;
      height: 280px;
      background: #16213e;
      color: #eee;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1.2rem;
      font-size: 1.1rem;
      line-height: 1.7;
      resize: vertical;
      outline: none;
      transition: border-color .3s;
    }
    textarea:focus { border-color: #e94560; }
    .tools {
      display: flex;
      gap: .6rem;
      justify-content: flex-end;
      flex-wrap: wrap;
    }
    .tools button {
      background: #16213e;
      color: #aaa;
      border: 1px solid #333;
      padding: .5rem 1.2rem;
      border-radius: 8px;
      cursor: pointer;
      font-size: .85rem;
      transition: all .2s;
    }
    .tools button:hover { background: #0f3460; color: #fff; border-color: #e94560; }
    .lang-select {
      background: #16213e;
      color: #aaa;
      border: 1px solid #333;
      padding: .5rem 1.2rem;
      border-radius: 8px;
      font-size: .85rem;
      cursor: pointer;
      outline: none;
    }
    .lang-select:focus { border-color: #e94560; }
    .interim {
      color: #666;
      font-style: italic;
      min-height: 1.5rem;
      text-align: center;
      font-size: .85rem;
      margin-top: .5rem;
    }
    .interim.has-text { color: #e94560; }
  </style>
</head>
<body>
<div class="container">
  <h1>🎤 語音打字機</h1>
  <p class="sub">按下麥克風，說話就會自動打字</p>

  <button class="mic-btn" id="micBtn">🎤</button>
  <div class="status" id="status">點擊麥克風開始語音輸入</div>

  <div class="textarea-wrap">
    <textarea id="output" placeholder="說出來的話會顯示在這裡…"></textarea>
  </div>

  <div class="interim" id="interim"></div>

  <div class="tools">
    <select class="lang-select" id="lang">
      <option value="zh-TW">中文（繁體）</option>
      <option value="zh-CN">中文（簡體）</option>
      <option value="en-US">English</option>
      <option value="ja-JP">日本語</option>
      <option value="ko-KR">한국어</option>
    </select>
    <button id="copyBtn">📋 複製</button>
    <button id="clearBtn">🗑️ 清除</button>
  </div>
</div>

<script>
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
if (!SpeechRecognition) {
  document.body.innerHTML = '<div style="text-align:center;padding:4rem;color:#e94560"><h2>❌ 不支援語音辨識</h2><p>請使用 Chrome 或 Edge 瀏覽器。</p></div>';
} else {
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  recognition.lang = 'zh-TW';

  const micBtn = document.getElementById('micBtn');
  const output = document.getElementById('output');
  const status = document.getElementById('status');
  const interim = document.getElementById('interim');
  const langSelect = document.getElementById('lang');
  let isListening = false;
  let finalText = '';

  function toggleListening() {
    if (isListening) {
      recognition.stop();
    } else {
      recognition.lang = langSelect.value;
      recognition.start();
    }
  }

  micBtn.addEventListener('click', toggleListening);

  langSelect.addEventListener('change', () => {
    if (isListening) {
      recognition.stop();
      recognition.lang = langSelect.value;
      recognition.start();
    }
  });

  recognition.addEventListener('start', () => {
    isListening = true;
    micBtn.classList.add('listening');
    status.textContent = '🎤 聆聽中…';
    status.className = 'status active';
  });

  recognition.addEventListener('end', () => {
    isListening = false;
    micBtn.classList.remove('listening');
    status.textContent = '⏸️ 已暫停，點擊麥克風繼續';
    status.className = 'status';
  });

  recognition.addEventListener('result', (e) => {
    let interimText = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const transcript = e.results[i][0].transcript;
      if (e.results[i].isFinal) {
        finalText += transcript;
        output.value = finalText;
        output.scrollTop = output.scrollHeight;
      } else {
        interimText += transcript;
      }
    }
    interim.textContent = interimText || '';
    interim.className = 'interim' + (interimText ? ' has-text' : '');
  });

  recognition.addEventListener('error', (e) => {
    status.textContent = '❌ 錯誤：' + e.error;
    if (e.error === 'not-allowed') {
      status.textContent = '❌ 請允許麥克風權限';
    }
    isListening = false;
    micBtn.classList.remove('listening');
  });

  document.getElementById('copyBtn').addEventListener('click', async () => {
    if (!output.value) return;
    try {
      await navigator.clipboard.writeText(output.value);
      const btn = document.getElementById('copyBtn');
      btn.textContent = '✅ 已複製';
      setTimeout(() => btn.textContent = '📋 複製', 1500);
    } catch {
      output.select();
      document.execCommand('copy');
    }
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    if (output.value && !confirm('清除所有文字？')) return;
    output.value = '';
    finalText = '';
  });
}
</script>
</body>
</html>
